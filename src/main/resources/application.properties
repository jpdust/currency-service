# ── Application ──────────────────────────────────────────────────────────────
spring.application.name=currency-service

# ── External currency API ─────────────────────────────────────────────────────
# Base URL of the currency rates provider (no trailing slash)
currency.api.base-url=https://allratestoday.com
# Path appended to the base URL for the rates endpoint
currency.api.path=/api/v1/rates
# Base currency for rate lookups
currency.api.source=USD
# Seconds to include in the Cache-Control: public, max-age=<value> header
currency.api.cache-max-age=300
# Seconds CloudFront may serve a stale cached response when the origin returns an error
# Included in Cache-Control: stale-if-error=<value>; 86400 = 24 hours
currency.api.stale-if-error=86400
# API key — resolved from CURRENCY_API_KEY env var in production;
# override in local.properties for local development (see local.properties.example)
currency.api.key=${CURRENCY_API_KEY:}

# Load local overrides without failing if the file is absent (e.g. in CI/prod)
spring.config.import=optional:file:local.properties

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
