# ── Application ──────────────────────────────────────────────────────────────
spring.application.name=currency-service
# Force servlet web context — required for aws-serverless-java-container to
# initialize correctly. Without this, Lambda's classloader bypasses Spring Boot's
# classpath detection and chooses WebApplicationType.NONE.
spring.main.web-application-type=servlet

# ── External currency API ─────────────────────────────────────────────────────
# Base URL of the currency rates provider (no trailing slash)
currency.api.base-url=https://allratestoday.com
# Path appended to the base URL for the rates endpoint
currency.api.path=/api/v1/rates
# Base currency for rate lookups
currency.api.source=USD
# Seconds to include in the Cache-Control: public, max-age=<value> header
currency.api.cache-max-age=300
# Seconds CloudFront may serve a stale cached response when the origin returns an error
# Included in Cache-Control: stale-if-error=<value>; 86400 = 24 hours
currency.api.stale-if-error=86400
# API key — resolved from CURRENCY_API_KEY env var in production;
# override in local.properties for local development (see local.properties.example)
currency.api.key=${CURRENCY_API_KEY:}

# Load local overrides without failing if the file is absent (e.g. in CI/prod)
spring.config.import=optional:file:local.properties

# ── Startup ───────────────────────────────────────────────────────────────────
# Exclude autoconfiguration classes unused by this service to reduce startup time
spring.autoconfigure.exclude=\
  org.springframework.boot.micrometer.metrics.autoconfigure.MetricsAutoConfiguration,\
  org.springframework.boot.micrometer.metrics.autoconfigure.CompositeMeterRegistryAutoConfiguration,\
  org.springframework.boot.micrometer.metrics.autoconfigure.jvm.JvmMetricsAutoConfiguration,\
  org.springframework.boot.micrometer.metrics.autoconfigure.system.SystemMetricsAutoConfiguration,\
  org.springframework.boot.micrometer.metrics.autoconfigure.logging.logback.LogbackMetricsAutoConfiguration,\
  org.springframework.boot.micrometer.metrics.autoconfigure.startup.StartupTimeMetricsListenerAutoConfiguration,\
  org.springframework.boot.micrometer.observation.autoconfigure.ObservationAutoConfiguration,\
  org.springframework.boot.webmvc.autoconfigure.WebMvcObservationAutoConfiguration,\
  org.springframework.boot.autoconfigure.jmx.JmxAutoConfiguration,\
  org.springframework.boot.autoconfigure.admin.SpringApplicationAdminJmxAutoConfiguration,\
  org.springframework.boot.actuate.autoconfigure.endpoint.jmx.JmxEndpointAutoConfiguration

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
